<html lang="en">
<head>

<title>Antigravity Cursor Particle System</title>

<script>
  (function() {
    var savedTheme = localStorage.getItem('theme');
    if (savedTheme) { document.documentElement.setAttribute('data-theme', savedTheme); }
    else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) { document.documentElement.setAttribute('data-theme', 'dark'); }
    else { document.documentElement.setAttribute('data-theme', 'light'); }
  })();

<style>
  :root {
    --c1: #BF5FFF;
    --c2: #FF6FC8;
    --c3: #00F5C4;
    --c4: #FFE03B;
    --c5: #7B61FF;
    --c6: #ad2d7c;
    --c7: #782cb5;
    --c8: #30289e;
    --c9: #00876c; 
  }

  [data-theme="light"] {
    --bg: #F0F0F5;
    --text: #1a1a2e;
    --btn-text: #1a1a2e;
    --btn-hover: #fff;
    --glass-bg: rgba(0, 0, 0, 0.04);
    --glass-border: rgba(0, 0, 0, 0.12);
    --glass-text: rgba(0, 0, 0, 0.8);
    --footer-bg: rgba(213, 213, 248, 0.733);
    --footer-border: rgba(0, 0, 0, 0.08);
    --footer-phrase: rgba(0, 0, 0, 0.6);
    --h1-grad-start: var(--c7);
    --h1-grad-end: var(--c6);
    --h2-color: #00876c;
    --h1-shadow: rgba(0, 0, 0, 0.2);
  }

  [data-theme="dark"] {
    --bg: #0D0D1A;
    --text: white;
    --btn-text: white;
    --btn-hover: #000;
    --glass-bg: rgba(255, 255, 255, 0.04);
    --glass-border: rgba(255, 255, 255, 0.12);
    --glass-text: rgba(255, 255, 255, 0.8);
    --footer-bg: rgba(13, 13, 26, 0.6);
    --footer-border: rgba(255, 255, 255, 0.08);
    --footer-phrase: rgba(255, 255, 255, 0.6);
    --h1-grad-start: var(--c1);
    --h1-grad-end: var(--c2);
    --h2-color: var(--c3);
    --h1-shadow: rgba(0, 0, 0, 0.5);
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background-color: var(--bg);
    overflow: hidden;
    font-family: system-ui, -apple-system, sans-serif;
    color: var(--text);
    min-height: 100vh;
    cursor: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  a, button, input {
    cursor: none;
  }

  #particle-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
  }

  main {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

  .hero {

  h1 {

    background-clip: text;

    filter: drop-shadow(0px 4px 6px var(--h1-shadow));
  }

  h2 {

  }

  #cta-button {

    color: var(--btn-text);

    text-transform: uppercase;
    letter-spacing: 0.1em;

  #cta-button:hover {

  .glass-card {

  #cursor-orb {

    pointer-events: none;
    z-index: 9999;
    filter: blur(2px);
    transition: width 0.3s ease, height 0.3s ease;
    will-change: transform, width, height;
  }

  #cursor-ring {
    position: fixed;

  }

  @media (min-width: 768px) {

  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 10;
    padding: 16px 24px;
    background: var(--footer-bg);
    backdrop-filter: blur(12px);

    justify-content: center;
    align-items: center;
    gap: 24px;

    text-align: center;
  }

  @media (max-width: 767px) {

  .footer-company {
    font-weight: 600;
    letter-spacing: 0.05em;
    background: linear-gradient(90deg, var(--c3), var(--c4));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 1px 2px 2px #9b9b9b;
  }

  .footer-phrase {
    font-size: 14px;
    color: var(--footer-phrase);
  }

  .theme-toggle {
    background: transparent;
    border: none;
    color: var(--text);
    padding: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 50%;
    transition: background 0.3s ease, transform 0.2s ease;
  }
  .theme-toggle:hover {
    background: var(--glass-bg);
    transform: scale(1.1);
  }
  .theme-toggle svg {
    width: 20px;
    height: 20px;
    fill: yellowgreen;
  }

  .whatsapp-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    background-color: #25D366;
    color: white;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    z-index: 100;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
  }

  .whatsapp-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 14px rgba(37, 211, 102, 0.4);
  }

  .whatsapp-btn svg {
    width: 32px;
    height: 32px;
    /*fill: currentColor;*/
    
    fill: yellowgreen;
    
  }

  @media (prefers-reduced-motion: reduce) {
    *, ::before, ::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
    #cursor-orb, #cursor-ring {
      display: none !important;
    }
    body, a, button, input {
      cursor: auto;
    }
    #particle-canvas {
      display: none !important;
    }
  }
</style>
</head>

<script>
// 1. Config Object
const CONFIG = {
  colors: ['var(--c1)', 'var(--c2)', 'var(--c3)', 'var(--c4)'],
  baseCount: 45,
  desktopCount: 80,
  desktopBreak: 768,
  repelRadius: 120,
  repelForce: 1.8,
  attractRadius: 80,
  attractForce: 0.6,
  spring: 0.012,
  damping: 0.88,
  jitter: 0.03,
  bounce: 0.7,
  burstCount: 12,
  burstDuration: 600,
  ringLerp: 0.2
};

// Evaluate CSS vars to exact hex values for canvas performance
const CSS_COLORS = ['#BF5FFF', '#FF6FC8', '#00F5C4', '#FFE03B'];

// 2. Canvas setup + resize handler
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d', { alpha: true });
let width, height;
let particles = [];
let bursts = [];
let resizeTimer;

function initParticles(targetCount) {
  if (particles.length < targetCount) {
    for (let i = particles.length; i < targetCount; i++) {
       particles.push(new Particle());
    }
  } else if (particles.length > targetCount) {
    particles.splice(targetCount);
  }
}

function handleResize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
  const targetCount = width >= CONFIG.desktopBreak ? CONFIG.desktopCount : CONFIG.baseCount;
  initParticles(targetCount);
}

window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(handleResize, 150);
});

// 3. Particle class
class Particle {
  constructor(x, y) {
    this.ox = x !== undefined ? x : Math.random() * window.innerWidth;
    this.oy = y !== undefined ? y : Math.random() * window.innerHeight;
    this.x = this.ox;
    this.y = this.oy;
    this.r = (Math.random() * 6 + 3) / 2; 
    this.vx = (Math.random() - 0.5) * 0.8;
    this.vy = (Math.random() - 0.5) * 0.8;
    this.opacity = Math.random() * 0.35 + 0.55;
    this.color = CSS_COLORS[Math.floor(Math.random() * CSS_COLORS.length)];
  }

  update(mx, my, isHover, rect) {
    this.vx += (Math.random() - 0.5) * 2 * CONFIG.jitter;
    this.vy += (Math.random() - 0.5) * 2 * CONFIG.jitter;
    
    let forceUsed = false;
    
    if (isHover && rect) {
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = cx - this.x;
      const dy = cy - this.y;
      const dist = Math.hypot(dx, dy);
      
      if (dist < CONFIG.attractRadius) {
        const f = ((CONFIG.attractRadius - dist) / CONFIG.attractRadius) * CONFIG.attractForce;
        this.vx += (dx / dist) * f;
        this.vy += (dy / dist) * f;
        forceUsed = true;
      }
    }
    
    if (!forceUsed && mx !== -100 && my !== -100) {
      const dx = this.x - mx;
      const dy = this.y - my;
      const dist = Math.hypot(dx, dy);
      
      if (dist < CONFIG.repelRadius) {
        const f = ((CONFIG.repelRadius - dist) / CONFIG.repelRadius) * CONFIG.repelForce;
        this.vx += (dx / dist) * f;
        this.vy += (dy / dist) * f;
      }
    }
    
    this.vx += (this.ox - this.x) * CONFIG.spring;
    this.vy += (this.oy - this.y) * CONFIG.spring;
    
    this.vx *= CONFIG.damping;
    this.vy *= CONFIG.damping;
    
    this.x += this.vx;
    this.y += this.vy;
    
    if (this.x < 0) { this.x = 0; this.vx *= -CONFIG.bounce; }
    else if (this.x > width) { this.x = width; this.vx *= -CONFIG.bounce; }
    
    if (this.y < 0) { this.y = 0; this.vy *= -CONFIG.bounce; }
    else if (this.y > height) { this.y = height; this.vy *= -CONFIG.bounce; }
  }

  draw(c) {
    c.beginPath();
    c.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    c.fillStyle = this.color;
    c.globalAlpha = this.opacity;
    c.shadowBlur = 10;
    c.shadowColor = this.color;
    c.fill();
    c.globalAlpha = 1;
    c.shadowBlur = 0;
  }
}

class BurstParticle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.r = (Math.random() * 4 + 2) / 2;
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.color = CSS_COLORS[Math.floor(Math.random() * CSS_COLORS.length)];
    this.life = 1;
    this.decay = 1 / (CONFIG.burstDuration / 16.6);
  }
  
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
  }
  
  draw(c) {
    c.beginPath();
    c.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    c.fillStyle = this.color;
    c.globalAlpha = Math.max(0, this.life);
    c.fill();
    c.globalAlpha = 1;
  }
}

// 4. Cursor tracking
const orb = document.getElementById('cursor-orb');
const ring = document.getElementById('cursor-ring');
const btn = document.getElementById('cta-button');

let mx = -100, my = -100;
let rx = -100, ry = -100;
let isHover = false;
let btnRect = null;
const isReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function updateCursor(x, y, target) {
  if (isReduced) return;
  mx = x;
  my = y;
  orb.style.transform = `translate3d(calc(${mx}px - 50%), calc(${my}px - 50%), 0)`;
  
  const isBtnHover = target === btn || btn.contains(target);
  const isThemeHover = target.closest('#theme-toggle');
  const isWaHover = target.closest('.whatsapp-btn');

  if (isBtnHover || isThemeHover || isWaHover) {
    if (!isHover) {
      isHover = true;
      btnRect = isBtnHover ? btn.getBoundingClientRect() : (isThemeHover ? target.closest('#theme-toggle').getBoundingClientRect() : target.closest('.whatsapp-btn').getBoundingClientRect());
      orb.style.width = '22px';
      orb.style.height = '22px';
      ring.style.opacity = '0.9';
    }
  } else {
    if (isHover) {
      isHover = false;
      orb.style.width = '12px';
      orb.style.height = '12px';
      ring.style.opacity = '0.4';
    }
  }
}

function handlePointer(e) {
  if (isReduced) return;
  if (e.touches && e.touches.length > 0) {
    const target = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
    updateCursor(e.touches[0].clientX, e.touches[0].clientY, target);
  } else if (!e.touches) {
    updateCursor(e.clientX, e.clientY, e.target);
  }
}

// 5. Render loop
function anim() {
  if (isReduced) return;
  
  ctx.clearRect(0, 0, width, height);
  
  if (mx !== -100 && my !== -100) {
    if (rx === -100) { rx = mx; ry = my; }
    rx += (mx - rx) * CONFIG.ringLerp;
    ry += (my - ry) * CONFIG.ringLerp;
    ring.style.transform = `translate3d(calc(${rx}px - 50%), calc(${ry}px - 50%), 0)`;
  }
  
  for (let p of particles) {
    p.update(mx, my, isHover, btnRect);
    p.draw(ctx);
  }
  
  for (let i = bursts.length - 1; i >= 0; i--) {
    let b = bursts[i];
    b.update();
    b.draw(ctx);
    if (b.life <= 0) bursts.splice(i, 1);
  }
  
  requestAnimationFrame(anim);
}

// 6. Event listeners
window.addEventListener('mousemove', handlePointer, { passive: true });
window.addEventListener('touchmove', handlePointer, { passive: true });

function triggerBurst(cx, cy) {
  if (isReduced) return;
  for (let i = 0; i < CONFIG.burstCount; i++) {
    bursts.push(new BurstParticle(cx, cy));
  }
}

window.addEventListener('click', (e) => {
  triggerBurst(mx !== -100 ? mx : e.clientX, my !== -100 ? my : e.clientY);
});

// Theme Toggle Logic
const root = document.documentElement;
const themeToggle = document.getElementById('theme-toggle');
const iconSun = document.getElementById('theme-icon-sun');
const iconMoon = document.getElementById('theme-icon-moon');
const whatsappBtn = document.getElementById('whatsapp-btn');
const whatsappBtnSvg = whatsappBtn.querySelector('svg');


function getPreferredTheme() {
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme) {
    return savedTheme;
  }
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    return 'dark';
  }
  return 'light';
}

function applyTheme(theme) {
  root.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  if (theme === 'dark') {
    iconSun.style.display = 'block';
    iconMoon.style.display = 'none';
    whatsappBtn.style.backgroundColor='#1b6938';
    whatsappBtnSvg.style.fill= 'yellowgreen';
  } else {
    iconSun.style.display = 'none';
    iconMoon.style.display = 'block';
    iconSun.style.fill = 'yellow';
    iconMoon.style.fill = 'blue';
    whatsappBtnSvg.style.fill= '#30289e';
    whatsappBtn.style.backgroundColor='var(--c9)';
  }
}

applyTheme(getPreferredTheme());

themeToggle.addEventListener('click', () => {
  const currentTheme = root.getAttribute('data-theme') || getPreferredTheme();
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  applyTheme(newTheme);
});

// 7. Init call
function init() {
  handleResize();
  if (!isReduced) requestAnimationFrame(anim);
}

init();
</script>
</body>
</html>
